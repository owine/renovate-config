name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  renovate-config-validator:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Validate against the same engine Mend-hosted runs (the Docker image tracks
    # real releases; the npm package lags ~35 minors behind). Renovate's native
    # github-actions manager updates this tag and the default.json pinDigests
    # rule appends the digest, so the self-update loop needs no custom manager.
    # User=12021 in the image would block actions/checkout writing the
    # workspace, so run the job container as root.
    container:
      image: ghcr.io/renovatebot/renovate:43.209.0@sha256:d18fd34cb125662aa78647053e9a45240582002f469dc5def7f7576baea12af9
      options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate Renovate presets
        run: |
          renovate-config-validator --strict \
            renovate.json \
            default.json \
            automerge.json \
            node.json \
            python.json \
            docker.json \
            mcp.json \
            alpine.json
